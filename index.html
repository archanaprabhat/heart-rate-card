<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Heart Rate</title>
  </head>
  <body>
    <div class="main">
      <div class="red-card">
        <div class="black-part">
          <div class="header">
            <div class="HeartRate red">Heart Rate</div>
            <div class="icon-heart red"></div>
          </div>
          <div class="main">
            <div class="date">Today 09:47 AM</div>
            <div class="actual-main">
              <div class="value">86</div>
              <div class="bpm">BPM</div>
            </div>
          </div>
        </div>
        <div class="line"></div>
        <div class="bottom"></div>
        <div class="average">Average</div>
        <div class="freq">
            <div>Weekly</div>
            <div>Monthly</div>
        </div>
        <div class="vals">
            <div class="first">
                <div>96</div>
                <div>BPM</div>
            </div>
            <div class="second">
                <div>77</div>
                <div>BPM</div>
            </div>
        </div>
      </div>
      <div class="green-card">
        <div class="black-part">
          <div class="header">
            <div class="HeartRate green">Heart Rate</div>
            <div class="icon-heart green"></div>
          </div>
          <div class="main">
            <div class="date">Today 09:47 AM</div>
            <div class="actual-main">
              <div class="value">86</div>
              <div class="bpm">BPM</div>
            </div>
          </div>
        </div>
        <div class="line"></div>
        <div class="bottom"></div>
        <div class="average">Average</div>
        <div class="freq">
            <div>Weekly</div>
            <div>Monthly</div>
        </div>
        <div class="vals">
            <div class="first">
                <div>96</div>
                <div>BPM</div>
            </div>
            <div class="second">
                <div>77</div>
                <div>BPM</div>
            </div>
        </div>
      </div>
    </div>
  </body>
</html>
